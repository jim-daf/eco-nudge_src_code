version: '3.8'

# =============================================================================
# Eco-Nudge Negotiator — Docker Compose Deployment
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#   3. docker compose exec ollama ollama pull qwen3:4b
#   4. Open https://your-domain (or http://localhost if testing locally)
# =============================================================================

services:
  # ── Ollama LLM Engine ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: econudge-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"   # Only expose to localhost (Nginx proxies)
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Uncomment if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy + Frontend ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: econudge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./eco-data.js:/usr/share/nginx/html/eco-data.js:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      ollama:
        condition: service_healthy

  # ── Certbot (SSL) — optional, for production ──────────────────────────────
  # Uncomment for HTTPS with Let's Encrypt:
  # certbot:
  #   image: certbot/certbot
  #   container_name: econudge-certbot
  #   volumes:
  #     - certbot_conf:/etc/letsencrypt
  #     - certbot_www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  ollama_data:
  certbot_conf:
  certbot_www:
